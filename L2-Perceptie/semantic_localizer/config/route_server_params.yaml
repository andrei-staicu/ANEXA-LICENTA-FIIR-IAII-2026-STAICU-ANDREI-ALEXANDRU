# =============================================================================
# Route Server Configuration for Semantic-Aware Navigation
# Nav2 Route Server / ROS 2 Jazzy
# =============================================================================
#
# Execution model:
#   ComputeAndTrackRoute → dense path generation → FollowPath (e.g., MPPI)
#
# Expected metadata usage:
#   - `PenaltyScorer` reads `penalty` from edge metadata generated by
#     `semantic_localizer`
#   - `DistanceScorer` can scale traversal cost using `speed_limit`
#   - `AdjustSpeedLimit` publishes runtime speed limits on `/speed_limit`
#
# Notes:
#   - The graph path below is written relative to the repository root.
#   - The Route Server is expected to consume the Nav2-compatible graph file.
# =============================================================================

route_server:
  ros__parameters:
    # ── Reference frames ──────────────────────────────────────────────────────
    base_frame: "base_link"
    route_frame: "map"

    # ── Planning parameters ───────────────────────────────────────────────────
    max_planning_time: 2.0
    max_iterations: 0                 # 0 = no explicit limit

    # ── Dense path generation ─────────────────────────────────────────────────
    path_density: 0.05                # meters between generated path points
    smooth_corners: true
    smoothing_radius: 0.5

    # ── Costmap for nearest-neighbor search ───────────────────────────────────
    costmap_topic: "global_costmap/costmap_raw"
    enable_nn_search: true
    max_nn_search_iterations: 5000
    num_nearest_nodes: 5

    # ── Graph file loader ─────────────────────────────────────────────────────
    graph_file_loader: "GeoJsonGraphFileLoader"
    graph_file_loader_plugin:
      plugin: "nav2_route::GeoJsonGraphFileLoader"
    graph_filepath: "maps/route_graph_fiir_nav2.geojson"

    # ── Edge scoring plugins ──────────────────────────────────────────────────
    edge_cost_functions: ["DistanceScorer", "PenaltyScorer"]

    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
      weight: 1.0
      speed_tag: "speed_limit"

    PenaltyScorer:
      plugin: "nav2_route::PenaltyScorer"
      weight: 5.0                     # Semantic penalty strongly influences routing
      penalty_tag: "penalty"

    # ── Route operations (used with ComputeAndTrackRoute) ─────────────────────
    operations: ["AdjustSpeedLimit"]

    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
      speed_limit_topic: "speed_limit"
      speed_tag: "speed_limit"

    # ── Route tracker ─────────────────────────────────────────────────────────
    tracker_update_rate: 20.0
    aggregate_blocked_ids: false

    # ── Node achievement / pruning ────────────────────────────────────────────
    boundary_radius_to_achieve_node: 0.8
    radius_to_achieve_node: 1.0
    max_prune_dist_from_edge: 3.0
    min_prune_dist_from_goal: 0.15
    min_prune_dist_from_start: 0.10
    prune_goal: true
